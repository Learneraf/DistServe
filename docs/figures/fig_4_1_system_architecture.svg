<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #1f2937; }
      .label { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 13px Arial, sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 8; }
      .input { fill: #eef7ff; stroke: #2563eb; }
      .model { fill: #fff7ed; stroke: #ea580c; }
      .search { fill: #f5f3ff; stroke: #7c3aed; }
      .result { fill: #f0fdf4; stroke: #16a34a; }
      .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="34" y="40" class="title">系统总体架构</text>

  <rect x="50" y="82" width="180" height="95" class="box input"/>
  <text x="140" y="115" text-anchor="middle" class="label">输入信息</text>
  <text x="140" y="142" text-anchor="middle" class="small">模型 / 工作负载</text>
  <text x="140" y="164" text-anchor="middle" class="small">设备池 / 延迟目标</text>

  <rect x="285" y="82" width="180" height="95" class="box input"/>
  <text x="375" y="115" text-anchor="middle" class="label">实测数据采集</text>
  <text x="375" y="142" text-anchor="middle" class="small">请求级延迟</text>
  <text x="375" y="164" text-anchor="middle" class="small">日志 / 批处理轨迹</text>

  <rect x="520" y="82" width="210" height="95" class="box model"/>
  <text x="625" y="115" text-anchor="middle" class="label">服务能力建模</text>
  <text x="625" y="142" text-anchor="middle" class="small">拟合执行时间</text>
  <text x="625" y="164" text-anchor="middle" class="small">小型推理框架</text>

  <rect x="790" y="82" width="190" height="95" class="box model"/>
  <text x="885" y="115" text-anchor="middle" class="label">能力输出</text>
  <text x="885" y="142" text-anchor="middle" class="small">不同设备 / 角色</text>
  <text x="885" y="164" text-anchor="middle" class="small">得到 mu</text>

  <rect x="285" y="260" width="220" height="95" class="box search"/>
  <text x="395" y="293" text-anchor="middle" class="label">异构资源搜索</text>
  <text x="395" y="320" text-anchor="middle" class="small">实例数量</text>
  <text x="395" y="342" text-anchor="middle" class="small">请求流向 / 有效吞吐</text>

  <rect x="575" y="260" width="220" height="95" class="box result"/>
  <text x="685" y="293" text-anchor="middle" class="label">可视化分析</text>
  <text x="685" y="320" text-anchor="middle" class="small">有效吞吐 / 加速比</text>
  <text x="685" y="342" text-anchor="middle" class="small">资源分配 / 请求流向</text>

  <path d="M 230 130 L 285 130" class="arrow"/>
  <path d="M 465 130 L 520 130" class="arrow"/>
  <path d="M 730 130 L 790 130" class="arrow"/>
  <path d="M 885 177 C 850 235, 750 250, 505 305" class="arrow"/>
  <path d="M 505 307 L 575 307" class="arrow"/>
  <path d="M 140 177 C 145 255, 210 300, 285 307" class="arrow"/>

  <text x="515" y="230" text-anchor="middle" class="tiny">第 4.5 节展开资源搜索模块</text>
</svg>
