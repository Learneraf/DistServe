  <text x="720" y="325" text-anchor="middle" class="small">有效吞吐/SLO误差</text>
  <text x="720" y="347" text-anchor="middle" class="small">资源分配/请求流向</text>
  <rect x="885" y="176" width="150" height="105" class="box result"/>
  <text x="960" y="209" text-anchor="middle" class="label">实验评估</text>
  <text x="960" y="237" text-anchor="middle" class="small">验证效果</text>
  <text x="960" y="259" text-anchor="middle" class="small">解释原因</text>
  <path d="M 270 140 L 330 140" class="arrow"/>
  <path d="M 550 140 L 610 140" class="arrow"/>
  <path d="M 720 193 C 700 240, 610 286, 550 317" class="arrow"/>
  <path d="M 550 317 L 610 317" class="arrow"/>
  <path d="M 830 317 C 870 295, 900 270, 885 230" class="arrow"/>
